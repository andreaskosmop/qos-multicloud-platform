worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── HTTP only (χωρίς SSL/TLS) — κατάλληλο για τοπική ανάπτυξη/επίδειξη ──
    server {
        listen 80;
        server_name _;

        # ── Frontend (React SPA) ───────────────────────────────
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backend REST API (§4.4.4) ──────────────────────────
        location /api/ {
            proxy_pass http://backend:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ασύγχρονες λειτουργίες (deploy/undeploy) μπορεί να διαρκέσουν λεπτά
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # ── Swagger / OpenAPI docs (§4.4.4 MFA-A03) ────────────
        location /api/swagger-ui.html {
            proxy_pass http://backend:8080/api/swagger-ui.html;
            proxy_set_header Host $host;
        }
    }
}
