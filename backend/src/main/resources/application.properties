# ── Server ────────────────────────────────────────────────────────
server.port=8080

# ── Database (Spring Data JPA + PostgreSQL + Flyway) ───────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cloudplatform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cloudplatform_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT (HS256, §4.4.1) ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:changeme_min_32_characters_long_secret_key}
jwt.expiration.ms=28800000
# 28800000ms = 8 ώρες

# ── Terraform (§5.1.1) ──────────────────────────────────────────────
terraform.workdir=/var/cloudplatform/workspaces
terraform.binary.path=/usr/local/bin/terraform

# ── Email / SMTP (NotificationService) ──────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── OAuth2 Google Login (MFA-OPT01, προαιρετικό) ────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# ── Actuator / Prometheus metrics ───────────────────────────────────
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.health.show-details=always

# ── Springdoc OpenAPI / Swagger UI (§4.4.1) ─────────────────────────
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html

# ── Logging ──────────────────────────────────────────────────────────
logging.level.gr.unipi.cloudplatform=INFO
logging.level.org.springframework.security=DEBUG
